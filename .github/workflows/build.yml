name: Build Prank App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build Windows EXE
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/*.exe
          retention-days: 30

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create www directory and copy web files
        run: |
          mkdir -p www
          cp index.html www/
          cp style.css www/
          cp script.js www/
          cp yamete-kudasai.mp3 www/

      - name: Install Capacitor dependencies
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Initialize Capacitor project
        run: |
          npx cap init CountdownPrank com.prank.countdown --web-dir www

      - name: Add Android platform
        run: |
          npx cap add android

      - name: Sync web assets to Android
        run: |
          npx cap sync android

      - name: Fix Kotlin duplicate classes
        run: |
          cat >> android/app/build.gradle << 'EOF'

          configurations.all {
              resolutionStrategy {
                  force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.22'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.22'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.22'
              }
          }
          EOF

      - name: Create VolumeControl native plugin
        run: |
          PLUGIN_DIR="android/app/src/main/java/com/prank/countdown"
          
          cat > "$PLUGIN_DIR/VolumePlugin.java" << 'JAVA'
          package com.prank.countdown;

          import android.content.Context;
          import android.media.AudioManager;
          import com.getcapacitor.Plugin;
          import com.getcapacitor.PluginCall;
          import com.getcapacitor.PluginMethod;
          import com.getcapacitor.annotation.CapacitorPlugin;

          @CapacitorPlugin(name = "VolumeControl")
          public class VolumePlugin extends Plugin {

              @PluginMethod
              public void setMaxVolume(PluginCall call) {
                  try {
                      AudioManager am = (AudioManager) getContext().getSystemService(Context.AUDIO_SERVICE);
                      if (am != null) {
                          int maxMusic = am.getStreamMaxVolume(AudioManager.STREAM_MUSIC);
                          am.setStreamVolume(AudioManager.STREAM_MUSIC, maxMusic, 0);
                          int maxRing = am.getStreamMaxVolume(AudioManager.STREAM_RING);
                          am.setStreamVolume(AudioManager.STREAM_RING, maxRing, 0);
                          int maxNotif = am.getStreamMaxVolume(AudioManager.STREAM_NOTIFICATION);
                          am.setStreamVolume(AudioManager.STREAM_NOTIFICATION, maxNotif, 0);
                          int maxAlarm = am.getStreamMaxVolume(AudioManager.STREAM_ALARM);
                          am.setStreamVolume(AudioManager.STREAM_ALARM, maxAlarm, 0);
                      }
                      call.resolve();
                  } catch (Exception e) {
                      call.resolve();
                  }
              }
          }
          JAVA

      - name: Register VolumePlugin in MainActivity
        run: |
          MAIN_ACTIVITY="android/app/src/main/java/com/prank/countdown/MainActivity.java"
          cat > "$MAIN_ACTIVITY" << 'JAVA'
          package com.prank.countdown;

          import android.os.Bundle;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  registerPlugin(VolumePlugin.class);
                  super.onCreate(savedInstanceState);
              }
          }
          JAVA

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
